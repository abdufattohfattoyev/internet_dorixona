# ============================================================
#  vitagum-gummy.uz  —  Host Nginx konfiguratsiyasi
#  Joyi: /etc/nginx/sites-available/vitagum-gummy.uz
#  (server da "sudo ln -s" bilan sites-enabled ga ulanadi)
# ============================================================

# HTTP → HTTPS yo'naltirish
server {
    listen 80;
    server_name vitagum-gummy.uz www.vitagum-gummy.uz;

    # Certbot uchun
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name vitagum-gummy.uz www.vitagum-gummy.uz;

    ssl_certificate     /etc/letsencrypt/live/vitagum-gummy.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vitagum-gummy.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # Media fayllar (loyiha papkasidan to'g'ridan-to'g'ri)
    location /media/ {
        alias /root/internet_dorixona/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Static fayllar
    location /static/ {
        alias /root/internet_dorixona/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    # Django ilovasi (Docker ichidagi gunicorn)
    location / {
        proxy_pass         http://127.0.0.1:8005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/vitagum_access.log;
    error_log  /var/log/nginx/vitagum_error.log;
}
